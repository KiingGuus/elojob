<!DOCTYPE html>
<html>
<head>
	<title>Exemplo de Cards</title>
	<style>
		.card-container {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
		}

		.card {
			background-color: #ffffff;
			box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
			width: 300px;
			margin: 10px;
			text-align: center;
			font-family: arial;
			padding: 10px;
		}

		.card img {
			max-width: 100%;
			height: auto;
		}

		.card h1 {
			font-size: 24px;
			color: #333333;
		}

		.card p {
			font-size: 16px;
			color: #777777;
		}
	</style>
</head>
<body>
	<div class="card-container">
		<div class="card">
			<img src="https://via.placeholder.com/150" alt="Imagem de exemplo">
			<h1>Título do Card</h1>
			<p>Descrição breve do card.</p>
		</div>

		<div class="card">
			<img src="https://via.placeholder.com/150" alt="Imagem de exemplo">
			<h1>Título do Card</h1>
			<p>Descrição breve do card.</p>
		</div>

		<div class="card">
			<img src="https://via.placeholder.com/150" alt="Imagem de exemplo">
			<h1>Título do Card</h1>
			<p>Descrição breve do card.</p>
		</div>
	</div>
</body>
</html>
